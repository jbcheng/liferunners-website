<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基要真理课程 — 生命跑者团契</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #1a1714;
    --ink-muted: #6b6560;
    --ink-faint: #b0aaa5;
    --parchment: #faf8f4;
    --surface:   #f3f0ea;
    --border:    #e2ddd5;
    --gold:      #9b6f2e;
    --gold-light:#f0e4cc;
    --teal:      #2a6b5e;
    --teal-light:#d8ede9;
    --red:       #8b3a3a;
    --red-light: #f5e4e4;
    --radius:    6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    background: var(--parchment);
    color: var(--ink);
    line-height: 1.75;
    font-size: 15px;
  }
  header {
    background: var(--ink);
    color: #f5f1ea;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header a { color: inherit; text-decoration: none; }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    letter-spacing: 0.03em;
  }
  .header-logo img { height: 28px; border-radius: 3px; }
  .header-nav { display: flex; gap: 1.5rem; font-size: 13px; color: #b0a898; }
  .header-nav a:hover { color: #f5f1ea; }
  .hero {
    background: var(--ink);
    color: #f5f1ea;
    padding: 3.5rem 2rem 3rem;
    text-align: center;
    border-bottom: 3px solid var(--gold);
  }
  .hero-eyebrow {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(1.5rem, 4vw, 2.4rem);
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }
  .hero-sub {
    font-size: 14px;
    color: #a09880;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  .book-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .book-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 1em;
    background: var(--gold);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .episode {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    margin-bottom: 0.75rem;
    transition: border-color 0.15s;
  }
  .episode:hover { border-color: var(--gold); }
  .episode-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }
  .episode-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--gold);
    background: var(--gold-light);
    border: 1px solid #d9c49e;
    border-radius: 20px;
    padding: 2px 10px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .episode-title {
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink);
    flex: 1;
    line-height: 1.5;
  }
  .episode-speaker {
    font-size: 12.5px;
    color: var(--ink-faint);
    margin-top: 3px;
  }
  .links-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 0.6rem;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 400;
    padding: 3px 10px;
    border-radius: 20px;
    text-decoration: none;
    white-space: nowrap;
    border: 1px solid transparent;
    transition: opacity 0.15s;
  }
  .chip:hover { opacity: 0.75; }
  .chip-audio  { background: var(--teal-light); color: var(--teal); border-color: #b3d9d2; }
  .chip-video  { background: var(--red-light);  color: var(--red);  border-color: #e5c0c0; }
  .chip-pdf    { background: var(--gold-light);  color: var(--gold); border-color: #d9c49e; }
  .chip::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .chip-audio::before { background: var(--teal); }
  .chip-video::before { background: var(--red); }
  .chip-pdf::before   { background: var(--gold); }
  .episode-special {
    background: var(--surface);
    border-left: 3px solid var(--gold);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
  }
  .episode-special .episode-title {
    font-size: 14px;
    font-weight: 400;
  }
  .page-footer {
    text-align: center;
    font-size: 13px;
    color: var(--ink-faint);
    padding: 2rem;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }
  .page-footer a { color: var(--gold); text-decoration: none; }
</style>
</head>
